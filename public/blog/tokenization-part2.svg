<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627">
  <!-- Background -->
  <rect width="1200" height="627" fill="#09090b"/>
  
  <!-- Subtle gradient overlay for depth -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="627" fill="url(#glow)"/>
  
  <!-- Top-left: Atlas logo mark -->
  <g transform="translate(60, 50)">
    <!-- Triangle mark -->
    <polygon points="0,28 16,0 32,28" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <polygon points="8,24 16,10 24,24" fill="#3b82f6" fill-opacity="0.2"/>
    <!-- Wordmark -->
    <text x="44" y="22" 
          font-family="'Instrument Sans', 'Helvetica Neue', Arial, sans-serif" 
          font-weight="700" 
          font-size="20" 
          letter-spacing="2.4" 
          fill="#f1f5f9">ATLAS</text>
    <text x="44" y="40" 
          font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" 
          font-weight="400" 
          font-size="11" 
          letter-spacing="2.0" 
          fill="#94a3b8">DIGITAL MARKETS</text>
  </g>
  
  <!-- Top-right: Series indicator -->
  <text x="1140" y="68" 
        text-anchor="end"
        font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" 
        font-weight="500" 
        font-size="13" 
        letter-spacing="2.0" 
        fill="#94a3b8">PART 2 OF A SERIES</text>
  <text x="1140" y="86" 
        text-anchor="end"
        font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" 
        font-weight="400" 
        font-size="11" 
        letter-spacing="1.5" 
        fill="#64748b">JUNE 2026</text>
  
  <!-- Main: Eyebrow text -->
  <text x="600" y="200" 
        text-anchor="middle"
        font-family="'Instrument Sans', 'Helvetica Neue', Arial, sans-serif" 
        font-weight="600" 
        font-size="22" 
        letter-spacing="4.5" 
        fill="#f1f5f9">TOKENIZATION</text>
  
  <!-- Hero: The big number -->
  <text x="600" y="370" 
        text-anchor="middle"
        font-family="'Instrument Sans', 'Helvetica Neue', Arial, sans-serif" 
        font-weight="800" 
        font-size="200" 
        letter-spacing="-4" 
        fill="#3b82f6">$5.5T</text>
  
  <!-- Subtitle under hero number -->
  <text x="600" y="420" 
        text-anchor="middle"
        font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" 
        font-weight="500" 
        font-size="17" 
        letter-spacing="3.0" 
        fill="#94a3b8">CITI · 2030 BASE CASE · PUBLISHED JUNE 2026</text>
  
  <!-- Accent line divider -->
  <rect x="300" y="470" width="600" height="1" fill="url(#accentLine)"/>
  
  <!-- Three data points in row -->
  <g transform="translate(0, 510)">
    <!-- Data point 1: Today -->
    <text x="240" y="0" 
          text-anchor="middle"
          font-family="'Instrument Sans', 'Helvetica Neue', Arial, sans-serif" 
          font-weight="700" 
          font-size="28" 
          fill="#f1f5f9">$1.4B</text>
    <text x="240" y="26" 
          text-anchor="middle"
          font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" 
          font-weight="400" 
          font-size="11" 
          letter-spacing="1.8" 
          fill="#94a3b8">TOKENIZED EQUITIES · MAY 2026</text>
    
    <!-- Divider -->
    <rect x="378" y="-18" width="1" height="42" fill="#27272a"/>
    
    <!-- Data point 2: Scale -->
    <text x="600" y="0" 
          text-anchor="middle"
          font-family="'Instrument Sans', 'Helvetica Neue', Arial, sans-serif" 
          font-weight="700" 
          font-size="28" 
          fill="#f1f5f9">$114T</text>
    <text x="600" y="26" 
          text-anchor="middle"
          font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" 
          font-weight="400" 
          font-size="11" 
          letter-spacing="1.8" 
          fill="#94a3b8">DTCC ASSETS UNDER CUSTODY</text>
    
    <!-- Divider -->
    <rect x="822" y="-18" width="1" height="42" fill="#27272a"/>
    
    <!-- Data point 3: Timeline -->
    <text x="960" y="0" 
          text-anchor="middle"
          font-family="'Instrument Sans', 'Helvetica Neue', Arial, sans-serif" 
          font-weight="700" 
          font-size="28" 
          fill="#f1f5f9">30 YRS</text>
    <text x="960" y="26" 
          text-anchor="middle"
          font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" 
          font-weight="400" 
          font-size="11" 
          letter-spacing="1.8" 
          fill="#94a3b8">US EQUITIES EXECUTION LAYER</text>
  </g>
  
  <!-- Bottom: URL -->
  <text x="600" y="600" 
        text-anchor="middle"
        font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" 
        font-weight="500" 
        font-size="12" 
        letter-spacing="2.5" 
        fill="#475569">ATLASDIGITALTRADING.COM</text>
</svg>
