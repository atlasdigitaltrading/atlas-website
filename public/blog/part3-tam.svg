<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="#09090b"/>
  <rect width="1200" height="627" fill="url(#glow)"/>

  <!-- Top-left: Atlas logo -->
  <g transform="translate(60, 50)">
    <polygon points="0,28 16,0 32,28" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <polygon points="8,24 16,10 24,24" fill="#3b82f6" fill-opacity="0.2"/>
    <text x="44" y="22" font-family="'Instrument Sans','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="20" letter-spacing="2.4" fill="#f1f5f9">ATLAS</text>
    <text x="44" y="40" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="11" letter-spacing="2.0" fill="#94a3b8">DIGITAL MARKETS</text>
  </g>

  <!-- Top-right: series indicator -->
  <text x="1140" y="68" text-anchor="end" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" font-weight="500" font-size="13" letter-spacing="2.0" fill="#94a3b8">PART 3 OF A SERIES</text>
  <text x="1140" y="86" text-anchor="end" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="11" letter-spacing="1.5" fill="#64748b">JUNE 2026</text>

  <!-- Eyebrow -->
  <text x="600" y="198" text-anchor="middle" font-family="'Instrument Sans','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="22" letter-spacing="4.5" fill="#f1f5f9">THE TOTAL ADDRESSABLE MARKET</text>

  <!-- Hero number -->
  <text x="600" y="372" text-anchor="middle" font-family="'Instrument Sans','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="205" letter-spacing="-4" fill="#3b82f6">$191T</text>

  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" font-weight="500" font-size="17" letter-spacing="2.5" fill="#94a3b8">THE INVESTABLE UNIVERSE · EVERYTHING, EVENTUALLY TOKENIZED</text>

  <!-- Accent divider -->
  <rect x="300" y="470" width="600" height="1" fill="url(#accentLine)"/>

  <!-- Three supporting data points -->
  <g transform="translate(0, 510)">
    <!-- 1 -->
    <text x="240" y="0" text-anchor="middle" font-family="'Instrument Sans','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="27" fill="#f1f5f9">3 PRODUCTS</text>
    <text x="240" y="26" text-anchor="middle" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="11" letter-spacing="1.6" fill="#94a3b8">ATLASX · DESK · PRO</text>
    <rect x="378" y="-18" width="1" height="42" fill="#27272a"/>
    <!-- 2 -->
    <text x="600" y="0" text-anchor="middle" font-family="'Instrument Sans','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="27" fill="#f1f5f9">1 ENGINE</text>
    <text x="600" y="26" text-anchor="middle" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="11" letter-spacing="1.6" fill="#94a3b8">CLOSED-LOOP CALIBRATION</text>
    <rect x="822" y="-18" width="1" height="42" fill="#27272a"/>
    <!-- 3 -->
    <text x="960" y="0" text-anchor="middle" font-family="'Instrument Sans','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="27" fill="#f1f5f9">EVERY ASSET</text>
    <text x="960" y="26" text-anchor="middle" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="11" letter-spacing="1.6" fill="#94a3b8">SPOT · DERIVS · TOKENIZED</text>
  </g>

  <!-- Bottom URL -->
  <text x="600" y="600" text-anchor="middle" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" font-weight="500" font-size="12" letter-spacing="2.5" fill="#475569">ATLASDIGITALTRADING.COM</text>
</svg>
